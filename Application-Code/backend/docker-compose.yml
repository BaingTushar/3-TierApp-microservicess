version: "3.8"

services:
  backend:
    build: .
    container_name: backend
    ports:
      - "8080:3000"
    environment:
      MONGO_CONN_STR: mongodb://mongodb:27017/mydatabase
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
